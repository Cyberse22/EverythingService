server:
  port: 7001

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/authdb?options=-c%20timezone=Asia/Ho_Chi_Minh
    username: postgres
    password: "Admin@123"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: filesystem:./migration
    # Thêm dòng này để Flyway chấp nhận Postgres 16 nếu version 10.20 vẫn báo lỗi
    validate-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/myrealm

keycloak:
  server-url: http://localhost:8080
  realm: myrealm
  client-id: admin-cli
  username: admin # Tài khoản admin keycloak của bạn
  password: admin # Mật khẩu admin keycloak của bạn